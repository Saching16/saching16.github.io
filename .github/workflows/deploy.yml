name: Deploy Portfolio
on:
  push:
    branches: ["main"] # Or "master" depending on your default branch
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 
        uses: actions/checkout@v4

      # If you're using Tailwind via CDN, you can skip a complex build step.
      # This step simply prepares the files for GitHub Pages.
      - name: Setup Pages 
        uses: actions/configure-pages@v4

      - name: Upload artifact 
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Deploy the entire root directory

      - name: Deploy to GitHub Pages 
        id: deployment
        uses: actions/deploy-pages@v4
